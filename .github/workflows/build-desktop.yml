name: Build Desktop App (Electron)

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Installer (.exe)
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build React Bundle (Vite)
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Build Electron Installer for Windows
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist_electron/*.exe
          retention-days: 7

  build-linux:
    name: Build Linux Package (.AppImage)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build React Bundle (Vite)
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Build Electron Package for Linux
        run: npx electron-builder --linux --publish never

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-package
          path: dist_electron/*.AppImage
          retention-days: 7

  release:
    name: Create GitHub Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: ./release-assets

      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-package
          path: ./release-assets

      - name: List Release Assets
        run: ls -lh ./release-assets/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./release-assets/*
          name: HR-GESTPRO ${{ github.ref_name }}
          body: |
            ## 🚀 HR-GESTPRO 2.0 — ${{ github.ref_name }}

            ### Instalação
            1. Descarrega **HR-GESTPRO-Setup.exe** (Windows) ou **.AppImage** (Linux)
            2. Executa o instalador
            3. A aplicação conecta automaticamente ao servidor Supabase em produção

            ### Novidades desta versão
            - Ver [CHANGELOG](https://github.com/ricardo-60/HR-GESTPRO-2.0/commits/main)

            ---
            *Processado por programa validado nº 000/AGT — HR-GESTPRO 2.0*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
